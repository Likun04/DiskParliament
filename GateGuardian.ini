# ============================================================
# GateGuardian.ini — 专家议会 v3.1 私有算力门禁配置
# ============================================================
#
# 此文件控制技能是否可以调用 models.json 中已配置的私有算力 API。
# 技能启动时会自动读取此文件并与 models.json 交叉验证。
#
# ⚠️ 此文件可能包含 API Key — 确保 .gitignore 已忽略 !!!
#
# --- 模型声明语法 ---
#
# 格式: model_id = endpoint_url, api_key
#
# 三种声明方式：
#   1. 只声明 ID（已在 models.json 中存在）:
#        deepseek-v4-pro = 
#      → 脚本从 models.json 中读取 url/apiKey
#
#   2. 声明完整配置（不在 models.json 中，需自动注入）:
#        my-local-glm  = http://localhost:11434/v1/chat/completions, ollama
#        my-cloud-mimo = https://api.xiaomimimo.com/v1, sk-xxxxxxxxxxxxxxxx
#      → 运行 --install 命令将模型注入 models.json
#      → supportsImages / supportsToolCall 由脚本自动检测或手工补充
#
#   3. 混合模式（部分已在 models.json，部分需注入）:
#        deepseek-v4-pro =                                          # ← 已有
#        glm-rescue     = https://open.bigmodel.cn/api/paas/v4, sk-xxx  # ← 需注入
#
# 注意：
#   - 纯声明（方式1）不泄露 Key，Key 在 models.json 中
#   - 完整配置（方式2）会在 --install 时将 Key 写入 models.json
#     models.json 受 .gitignore 保护，不会推送到 Git

[Gate]
# 知情门控：用户是否已知悉并确认 models.json 中的私有算力配置
# true  = 已验证，技能可以使用自定义算力
# false = 未验证，技能启动前需要引导用户检查配置
informed = true

# 最后验证时间（gate_guardian.py --validate 自动写入）
last_validated = 2026-06-12T01:13:19

[Models]
# 用户声明希望用于专家议会的私有模型
# 用法见文件头部「模型声明语法」
deepseek-v4-pro = 
qwen3_code = 
mimo-v2.5 = 
